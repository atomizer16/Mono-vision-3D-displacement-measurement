# YOLO11-SEG + BoT-SORT tracking configuration
detection:
  model_type: seg
  weights: weights/yolo11-seg.pt
  conf_thres: 0.25
  iou_thres: 0.45

tracking:
  tracker: botsort
  iou_thres: 0.30
  max_age: 30
  min_hits: 3
  reconnect:
    enabled: true
    reconnect_frames: 15  # short-term occlusion reconnection
